appId: com.demo.Demo
productName: Demo
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.app.json}'
asarUnpack:
  - resources/**

mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  signIgnore: []
  identity: "Chao Tang (PYQ3YRX8CP)"  # Keep signing
  notarize: false  # Disable automatic notarization
  binaries: [
    "Contents/Resources/app.asar.unpacked/node_modules/tsx/node_modules/@esbuild/darwin-arm64/bin/esbuild",
    "Contents/Resources/app.asar.unpacked/node_modules/fsevents/fsevents.node"
  ]


dmg:
  artifactName: ${name}-${version}.${ext}
  sign: true  # Keep DMG signing
  writeUpdateInfo: false
